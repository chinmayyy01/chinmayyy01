name: Update GitHub Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate streak stats SVG
        uses: DenverCoder1/github-readme-streak-stats@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: assets/streak.svg
          options: "user=chinmayyy01&theme=dark&hide_border=true&date_format=M%20j%5B%2C%20Y%5D&locale=en&type=svg"

      - name: Commit updated streak SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg
          git diff --cached --quiet || git commit -m "chore: update streak stats [skip ci]"
          git push
